org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Workaround: Kotlin incremental compilation can crash on Windows when project and
# dependency sources live on different drive roots (e.g., project on D:\ and
# Pub cache on C:\). This disables incremental caches to keep builds stable.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
